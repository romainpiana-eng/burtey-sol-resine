📁 Recommandé : déplacer le dossier hors de OneDrive
OneDrive + Git = problèmes potentiels (synchro qui bloque des fichiers du .git, conflits, lenteurs). Je vous recommande de déplacer votre dossier vers un emplacement local pur, par exemple :

C:\Users\Romain.Piana\Projets\Burtey-Sol-Resine\
Vous pouvez créer un dossier Projets à la racine de votre profil utilisateur, et y déplacer le contenu. Vos fichiers ne disparaîtront pas de OneDrive si vous les coupez/collez (juste, ils ne seront plus synchronisés en ligne — mais c'est GitHub qui jouera ce rôle de sauvegarde, et bien mieux).

💡 Bonus : évitez aussi les espaces et caractères spéciaux (&, accents) dans les noms de dossier pour les outils en ligne de commande. C'est gérable mais ça peut créer des galères. Burtey-Sol-Resine ou burtey-website est plus safe que Burtey Sol & Résine.

