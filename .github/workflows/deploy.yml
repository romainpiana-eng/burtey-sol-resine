MAIS les fichiers HTML à la racine (index.html, services.html, etc.) ne sont PAS mentionnés !

C'est un comportement bizarre de la commande SFTP put -r ./deploy/* avec cette version de l'action : avec le wildcard *, sur certaines versions de sshpass/sftp, les fichiers au premier niveau sont parfois ignorés, seuls les dossiers sont traités récursivement.

Et alors, vous me demandez : "mais pourquoi les autres pages HTML semblent à jour ?" — réponse : elles sont à jour depuis l'avant-dernier déploiement où ça a marché. C'est par hasard que pour CE déploiement-ci, seul index.html semble cassé. En réalité, aucun fichier HTML n'a été mis à jour lors de ce dernier run.

🔧 La solution : changer la façon de référencer les fichiers
On va modifier le deploy.yml pour utiliser ./deploy/ (le dossier complet) au lieu de ./deploy/* (le wildcard).

Étape 1 — Modifier deploy.yml
Sur GitHub, ouvrez .github/workflows/deploy.yml
Icône crayon ✏️
Trouvez cette ligne :
yaml
          local_path: './deploy/*'
Remplacez-la par :
yaml
          local_path: './deploy/'
Juste supprimer le * à la fin.

Commit changes
Étape 2 — Vérifier le déploiement
Le commit déclenche automatiquement un nouveau run de la Action. Allez dans Actions, regardez le nouveau run.

Dans les logs, vous devriez maintenant voir chaque fichier HTML listé individuellement :

Uploading ./deploy/index.html to /public/index.html
Uploading ./deploy/services.html to /public/services.html
...
Étape 3 — Tester
En navigation privée, allez sur https://votre-domaine.fr/ → le bon SIRET doit s'afficher 🎉

💡 Au passage : si après ça les fichiers à la racine sont toujours pas mis à jour, on essaiera une troisième syntaxe local_path: './deploy/.' ou on listera explicitement les fichiers. Mais 9 fois sur 10, supprimer le * règle ce genre de souci avec cette Action.

