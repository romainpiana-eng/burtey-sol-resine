🎯 TROUVÉ ! Voilà l'explication.

Si l'utilisateur (ou plus probablement Windows lui-même via une politique d'entreprise SoftwareOne) a activé l'option "Réduire les animations", ce media query passe l'animation à 0.01ms. Avec animation-duration: 0.01ms mais avec forwards, l'animation devrait quand même finir à opacity: 1 à la fin... mais elle est tellement rapide que dans certains navigateurs elle peut "rater".

Le pire c'est que mon opacity: 0 initial reste alors actif. Donc le contenu reste invisible.

Solution : retirer les opacity: 0 du CSS et faire les animations en from/to propres, ou plus simple encore : rendre le contenu visible par défaut, l'animation est juste un "+" optionnel.


