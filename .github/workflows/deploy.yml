OK, .container a width: 100% et max-width. Ça doit fonctionner avec display: grid ajouté dessus. Mais combiné au .hero parent en flex, ça peut créer des problèmes de hauteur (le min-height: 90vh + flex peut écraser le contenu).

En fait je crois avoir compris. Sur la capture d'écran, je vois que la zone hero est bien là (la couleur sable est visible), mais le contenu est invisible. Et la zone fait environ 700px de haut (correspond au min-height: 90vh). Donc la hauteur est bonne, c'est juste le contenu interne qui ne s'affiche pas.

L'animation fadeUp qui démarre à opacity: 0 est peut-être en cause — si pour une raison liée au prefers-reduced-motion ou autre, l'animation ne se joue pas, tout reste invisible.

Je vais simplifier : retirer les animations à opacity: 0 (qui sont risquées) et laisser tout visible par défaut. Plus simple et plus robuste.


