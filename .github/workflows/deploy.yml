Critères pour de bonnes photos hero
Lumière : naturelle de jour, ni trop sombre ni surexposée
Cadrage : la matière doit être l'élément principal (pas un mur ou un meuble qui prend tout)
Qualité : photo nette, pas floue. Une photo smartphone moderne suffit largement.
Format : peu importe (portrait/paysage), je recadrerai
Pas de visages, pas de personnes identifiables sans accord (RGPD)
