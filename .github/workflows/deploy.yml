ÉTAPE 4 — Créer la GitHub Action
On va créer le fichier directement depuis l'interface GitHub (sans terminal).

4.1 — Créer le fichier deploy.yml
Sur la page de votre repo burtey-sol-resine sur GitHub
Cliquez Add file → Create new file
Dans la barre du nom du fichier, tapez exactement :
.github/workflows/deploy.yml
💡 Tapez les / un par un, GitHub crée automatiquement les sous-dossiers .github puis workflows.

Dans la grande zone de texte en dessous, collez tel quel ce contenu :
yaml
name: Déploiement IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Déploiement SFTP vers IONOS
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Déployer en SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: sftp
          server-dir: ./public/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/README.md
            **/.DS_Store
            **/Thumbs.db
Tout en bas de la page : Commit changes...
Dans le popup : laissez "Commit directly to the main branch"
Cliquez Commit changes
🚀 Le déploiement va se déclencher automatiquement
Le simple fait de créer ce fichier compte comme un push sur main. La Action va donc se lancer toute seule, immédiatement.

