2️⃣ Remplacer le contenu du deploy.yml
Sur GitHub, ouvrez .github/workflows/deploy.yml → icône crayon ✏️ → remplacez tout le contenu par celui-ci :

yaml
name: Déploiement IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Déploiement SFTP vers IONOS
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Préparer les fichiers à déployer
        run: |
          mkdir -p deploy
          cp -r index.html services.html realisations.html zone.html contact.html css js deploy/

      - name: Déployer en SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local_path: './deploy/*'
          remote_path: '/public/'
          sftp_only: true
Tout en bas : Commit changes → Commit changes.

📖 Petites différences à noter
local_path: './deploy/*' : on copie d'abord les bons fichiers dans un dossier deploy/ pour ne pas envoyer .github, .git, README, etc. C'est plus propre que des règles d'exclusion.
remote_path: '/public/' : noter le slash au début. Avec cette Action, le chemin est absolu depuis la racine SFTP. Si ça ne marche pas, on essaiera './public/' ou 'public/'.
sftp_only: true : force le SFTP, pas de fallback FTP.
