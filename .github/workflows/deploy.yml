Claude a répondu : Ah, l'erreur SSL apparaît seulement sur mobile — bizarre.
Ah, l'erreur SSL apparaît seulement sur mobile — bizarre. Avant de creuser, j'aimerais cerner précisément le contexte :

En attendant, voici ce que je sais déjà :

🔍 Causes possibles d'ERR_SSL_PROTOCOL_ERROR
ERR_SSL_PROTOCOL_ERROR veut dire que le navigateur n'a pas pu établir une connexion HTTPS avec le serveur. Sur mobile uniquement = quelque chose diffère entre votre PC et votre mobile.

Hypothèse 1 — Certificat SSL Let's Encrypt pas encore actif (la plus probable)
IONOS génère le certificat automatiquement après le branchement du domaine, mais ça prend parfois plusieurs heures (jusqu'à 24h). Pendant ce délai :

Sur PC, votre navigateur peut avoir mémorisé une session OK
Sur mobile (qui n'a jamais visité), il essaie une connexion fraîche → échec si SSL pas encore prêt
➡️ Vérification : connectez-vous à IONOS → Domaines & SSL → cliquez sur votre domaine → onglet/section SSL → regardez si c'est noté "actif", "en cours", ou "à activer".

Hypothèse 2 — Date/heure du téléphone décalée
Si l'horloge du mobile est mal réglée (ça arrive après une longue absence, un changement de fuseau, etc.), il rejette les certificats SSL valides parce qu'il pense qu'ils sont "futurs" ou "expirés".

➡️ Vérification : Réglages → Date/heure → activer "Date et heure automatiques".

Hypothèse 3 — Une connexion HTTP forcée
Si vous tapez http:// (sans le 's'), IONOS doit normalement rediriger vers https://. Sur mobile, certains navigateurs gèrent cette redirection différemment.

Hypothèse 4 — Cache mobile pollué
Le mobile a peut-être tenté la connexion avant que le SSL soit configuré et garde l'erreur en cache.

➡️ Solution : vider le cache du navigateur mobile, ou tester depuis un autre navigateur mobile (Firefox si vous étiez sur Chrome, Brave, etc.).

