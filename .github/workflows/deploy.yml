ÉTAPE 5 — Brancher votre nom de domaine sur l'hébergement
Comme votre domaine ET votre hébergement sont chez le même prestataire (IONOS), c'est très simple : pas de configuration DNS manuelle à faire, tout se passe en quelques clics dans l'espace client.

5.1 — Aller dans la section Domaines
Connectez-vous à login.ionos.fr
Dans le menu (à gauche ou en haut selon l'interface) : "Domaines & SSL"
Vous voyez la liste de vos domaines — cliquez sur celui que vous voulez brancher
5.2 — Affecter le domaine à l'hébergement
Sur la page du domaine, vous cherchez une option du genre :

"Destination" ou "Affecter à" ou "Utilisation"
ou un bouton "Modifier la destination" / "Configurer"
Vous voulez choisir comme destination : votre pack d'hébergement (celui dans lequel on a déployé via GitHub).

L'option exacte ressemble à :

"Affecter à un site web / Hébergement"
"Connecter à un pack d'hébergement"
"Pointer vers un Webspace"
Sélectionnez-la, choisissez votre pack d'hébergement dans la liste, et validez.

💡 Important : à ce stade, IONOS peut vous demander dans quel dossier du webspace pointer. Le bon dossier, c'est / (la racine, pas /public/). Pourquoi ? Parce que public/ est déjà la racine web par défaut configurée par IONOS — c'est là que https://votre-domaine.fr/ ira chercher l'index. Si IONOS demande explicitement un dossier, mettez / ou laissez vide.

⚠️ Si vous voyez un champ "Dossier de destination" ou "Document root" que vous pouvez modifier : laissez la valeur par défaut suggérée par IONOS. C'est elle qui sait.

5.3 — SSL / HTTPS
IONOS active généralement le certificat SSL gratuit (Let's Encrypt) automatiquement quelques minutes après l'affectation du domaine. Vérifiez quand même qu'il est bien activé :

Dans la section SSL ou Sécurité du domaine
Si pas activé : cherchez un bouton "Activer SSL" ou "Activer HTTPS"
C'est gratuit et indispensable (Google déclasse les sites sans HTTPS, et le formulaire de contact ne marchera pas correctement sans).

5.4 — Patience
Le branchement peut prendre :

Quelques minutes : c'est instantané chez IONOS interne
Jusqu'à 24h : si vous aviez déjà visité le domaine récemment, votre navigateur ou FAI peut avoir mis en cache l'ancienne réponse DNS
Pour tester sans cache, ouvrez une fenêtre de navigation privée et tapez : https://votre-domaine.fr

