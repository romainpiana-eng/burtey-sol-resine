🤖 Le principe d'une GitHub Action
Une "Action" = un petit fichier YAML placé dans .github/workflows/ de votre repo. À chaque événement (push, modification, etc.), GitHub lance une machine virtuelle gratuitement, exécute les étapes décrites dans le fichier, puis l'éteint.

Pour notre cas, le fichier va dire en gros :

"Quand quelqu'un pousse du code sur la branche main, alors prends tout le contenu du repo et balance-le en SFTP vers IONOS, dans le dossier xxx."

L'action qu'on va utiliser s'appelle SamKirkland/FTP-Deploy-Action — c'est l'une des plus utilisées (des milliers de projets l'emploient), elle gère le SFTP, et elle est intelligente : elle ne ré-uploade que les fichiers qui ont changé depuis le dernier déploiement (rapide). Mention : c'est un "third-party action", elle est en open source sur GitHub, mais comme toute dépendance externe c'est bon de le savoir.

