🔧 La nouvelle approche : wlixcc/SFTP-Deploy-Action
C'est une autre Action populaire et fiable, qui elle parle nativement SFTP (port 22), exactement ce qu'on veut.

1️⃣ Vérifier que les secrets sont bons
On reste sur :

FTP_SERVER : votre serveur SFTP
FTP_USERNAME : votre identifiant
FTP_PASSWORD : votre mot de passe
