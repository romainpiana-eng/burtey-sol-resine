Sur votre repo, cliquez sur l'onglet Actions (en haut)
Vous voyez un workflow en cours, intitulé "Déploiement IONOS" avec un point jaune (en cours) ou vert (réussi) ou rouge (échec)
Cliquez dessus puis sur le job "Déploiement SFTP vers IONOS" pour voir les logs en direct
Le déploiement prend généralement 30 secondes à 2 minutes.

