🎯 JE VOIS LE PROBLÈME !

Sur écran large (≥992px), j'ai mis display: flex; align-items: center sur .hero lui-même. Mais à l'intérieur, .hero__inner est en display: grid. Le problème c'est le .container : c'est lui qui contient .hero__inner via <div class="container hero__inner">. Et le container a une max-width qui, combiné avec le flex parent, crée un conflit.

Regardons aussi un autre point : .hero__inner est sur le même élément que .container (deux classes sur le même div). Le .container a probablement display: block ou similaire, et mon display: grid doit être surchargé par la spécificité.


