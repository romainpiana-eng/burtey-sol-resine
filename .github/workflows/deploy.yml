Encore une fois, seuls les dossiers sont listés (images, js, css) — aucun fichier HTML n'apparaît. La commande put -r ./deploy/ envoie le contenu récursivement mais cette version de SFTP semble ne transférer que les sous-dossiers, pas les fichiers à la racine du dossier source.

C'est un bug connu de wlixcc/SFTP-Deploy-Action avec certains serveurs SFTP. On va changer d'approche complètement — utiliser une Action plus fiable.

🔧 La solution : basculer sur lftp (beaucoup plus robuste)
On va remplacer l'étape SFTP par une commande lftp qui est un client FTP/SFTP bien plus fiable, disponible nativement sur Ubuntu (le runner GitHub).

Étape 1 — Remplacer le contenu de deploy.yml
Sur GitHub, ouvrez .github/workflows/deploy.yml → crayon ✏️ → remplacez TOUT le contenu par :

yaml
name: Déploiement IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Déploiement SFTP vers IONOS
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Déployer en SFTP via lftp
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
               -p ${{ secrets.FTP_PORT }} \
               sftp://${{ secrets.FTP_SERVER }} <<SCRIPT
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          mirror --reverse --verbose --delete \
                 --exclude ^\.git/ \
                 --exclude ^\.github/ \
                 ./ /public/
          quit
          SCRIPT
          echo "✅ Déploiement terminé"
Étape 2 — Commit
Commit changes → message : "Switch to lftp for reliable SFTP deploy"

Étape 3 — Ce que ça change
lftp mirror --reverse est la méthode la plus fiable pour synchroniser un dossier local vers un serveur distant en SFTP. Contrairement à l'ancienne Action :

✅ Transfère TOUS les fichiers (HTML, CSS, JS, images, tout)
✅ Ne transfère que les fichiers modifiés (comparaison automatique par date/taille)
✅ Le flag --delete supprime sur le serveur les fichiers qui n'existent plus dans le repo (nettoyage automatique)
✅ --exclude .git/ --exclude .github/ évite d'envoyer les fichiers techniques
✅ Plus besoin de l'étape intermédiaire cp -r ... deploy/ — on synchronise directement la racine du repo
💡 Avantage bonus : avec --verbose, les logs afficheront chaque fichier transféré par son nom. Fini les déploiements "mystère" où on ne sait pas ce qui est passé.

