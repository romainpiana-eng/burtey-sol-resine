🔧 Correction appliquée
Le coupable : Windows (probablement la politique d'entreprise SoftwareOne) avait activé "Réduire les animations". Mon CSS lançait les animations avec opacity: 0 au démarrage, et avec animations réduites elles ne se jouaient pas → tout restait invisible. C'est ce qu'on appelle un classique "FART (Flash of inAnimated Reduced Transition)".

Ce que j'ai changé :

Retiré tous les opacity: 0 initiaux dans la hero → le contenu est visible immédiatement
Remplacé forwards par both (plus robuste)
Ajouté une double sécurité dans la règle prefers-reduced-motion qui force opacity: 1 et transform: none sur tous les éléments concernés
Maintenant, quel que soit votre paramètre Windows ou navigateur, le contenu sera toujours visible.

